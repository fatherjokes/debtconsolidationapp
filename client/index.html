    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is debt consolidation?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Debt consolidation combines multiple debts into a single loan or payment, typically at a lower interest rate, making it easier to manage and potentially saving money on interest. It does not reduce the total amount owed but simplifies repayment and can lower your overall interest cost."
          }
        },
        {
          "@type": "Question",
          "name": "How does debt settlement affect my credit score?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Debt settlement typically causes a credit score drop of 100-200+ points and remains on your credit report for 7 years. During the program you stop paying creditors, which triggers delinquencies and collection activity. It makes qualifying for mortgages and other loans very difficult during and after the program."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between Chapter 7 and Chapter 13 bankruptcy?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Chapter 7 bankruptcy liquidates non-exempt assets to discharge most unsecured debt and stays on your credit report for 10 years. It is typically completed in 3-6 months. Chapter 13 creates a court-supervised repayment plan over 3-5 years and stays on your report for 7 years. Chapter 13 allows you to keep assets like a home if you stay current on payments."
          }
        },
        {
          "@type": "Question",
          "name": "What is a debt management plan (DMP)?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A debt management plan is a structured repayment program offered through nonprofit credit counseling agencies such as NFCC members. The agency negotiates reduced interest rates (often 6-10%) with your creditors and you make one consolidated monthly payment to the agency, which distributes it to your creditors. DMPs typically take 3-5 years and have a minimal impact on your credit score compared to settlement or bankruptcy."
          }
        },
        {
          "@type": "Question",
          "name": "Can I buy a house after debt settlement or bankruptcy?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "After debt settlement, most lenders require 2-4 years of rebuilt credit before approving a mortgage. After Chapter 7 bankruptcy, FHA loans require a 2-year waiting period; conventional loans require 4 years. Chapter 13 may allow FHA loans after 1 year of on-time plan payments with court approval. In all cases, you will need to rebuild your credit score and demonstrate stable income."
          }
        },
        {
          "@type": "Question",
          "name": "What credit score do I need to qualify for a debt consolidation loan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most lenders require a minimum credit score of 580-640 for a debt consolidation loan, though the best interest rates (below 10% APR) typically require a score of 700 or higher. Borrowers with scores below 580 may still qualify through credit unions or secured loans, but rates will be higher. If your score is too low for a favorable rate, a debt management plan may be a better alternative."
          }
        },
        {
          "@type": "Question",
          "name": "What is a balance transfer credit card and how does it help with debt?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A balance transfer card lets you move high-interest credit card debt to a new card with a 0% introductory APR, typically lasting 12-21 months. This allows you to pay down principal without accruing interest during the promotional period. Most cards charge a balance transfer fee of 3-5% of the transferred amount. This strategy works best for people with good credit (670+) who can pay off the balance before the promotional period ends."
          }
        },
        {
          "@type": "Question",
          "name": "How do I calculate my debt-to-income ratio?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Your debt-to-income (DTI) ratio is calculated by dividing your total monthly debt payments by your gross monthly income, then multiplying by 100. For example, if you pay $1,500 per month in debt payments and earn $5,000 per month, your DTI is 30%. Lenders generally prefer a DTI below 36% for loan approval. A DTI above 50% signals financial stress and may limit your options to a DMP, settlement, or bankruptcy."
          }
        },
        {
          "@type": "Question",
          "name": "Is debt consolidation the same as debt settlement?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Debt consolidation combines your debts into one loan or payment and you repay the full amount owed, usually at a lower interest rate. Debt settlement involves negotiating with creditors to accept less than the full balance owed, typically 40-60 cents on the dollar. Settlement causes severe credit damage and may result in taxable income on the forgiven amount, while consolidation has minimal credit impact."
          }
        },
        {
          "@type": "Question",
          "name": "Will debt consolidation hurt my credit score?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A debt consolidation loan causes a small, temporary dip (5-10 points) from the hard credit inquiry, but typically improves your credit score over time by reducing your credit utilization ratio and establishing a consistent payment history. A debt management plan may cause a moderate impact as accounts are noted as enrolled. Balance transfers have minimal impact. Settlement and bankruptcy cause severe, long-lasting damage."
          }
        },
        {
          "@type": "Question",
          "name": "What types of debt can be consolidated?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Debt consolidation works best for unsecured debts including credit card balances, medical bills, personal loans, utility arrears, and payday loans. Secured debts like mortgages and auto loans are generally not included. Federal student loans have their own consolidation programs through the Department of Education. Private student loans can sometimes be refinanced through private lenders."
          }
        },
        {
          "@type": "Question",
          "name": "How long does a debt management plan take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most debt management plans take 3 to 5 years to complete, depending on the total debt amount and the negotiated interest rates. The average DMP participant pays off their enrolled debt in approximately 48 months. You must make consistent monthly payments throughout the program; missing payments can cause creditors to withdraw their concessions and reinstate original interest rates."
          }
        },
        {
          "@type": "Question",
          "name": "What are the tax consequences of debt settlement?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "When a creditor forgives $600 or more of debt, they are required to issue a Form 1099-C to you and the IRS. The forgiven amount is generally treated as ordinary taxable income in the year it is forgiven. For example, if $10,000 of debt is settled for $4,000, the $6,000 difference may be taxable. There is an insolvency exclusion — if your total liabilities exceeded your total assets at the time of settlement, you may be able to exclude some or all of the forgiven amount."
          }
        },
        {
          "@type": "Question",
          "name": "Can I consolidate debt if I have bad credit?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, but your options are more limited. With bad credit (below 580), traditional personal loans will carry very high interest rates (25-36% APR) that may not save you money. Better alternatives include a nonprofit debt management plan (credit score is not a qualifying factor), a secured consolidation loan using collateral, or borrowing from a credit union which often has more flexible lending criteria. A nonprofit credit counselor can help you evaluate all options for free."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between a nonprofit credit counselor and a for-profit debt settlement company?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nonprofit credit counseling agencies (NFCC members) offer free or low-cost budgeting advice and debt management plans. They work with your creditors to reduce interest rates while you repay the full balance. For-profit debt settlement companies charge fees of 15-25% of enrolled debt and instruct you to stop paying creditors while they negotiate reductions. Settlement companies cause severe credit damage and carry significant legal and financial risks. Always verify a counselor's nonprofit status and NFCC or FCAA membership."
          }
        },
        {
          "@type": "Question",
          "name": "How much does a debt management plan cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nonprofit credit counseling agencies typically charge a one-time setup fee of $0-$75 and a monthly maintenance fee of $25-$50 for a debt management plan. By law, fees are capped and agencies must provide services regardless of ability to pay. Compare this to debt settlement companies, which charge 15-25% of total enrolled debt — on a $20,000 debt, that is $3,000-$5,000 in fees alone."
          }
        },
        {
          "@type": "Question",
          "name": "Should I use my home equity to consolidate debt?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Using a home equity loan or HELOC to consolidate unsecured debt converts that debt into secured debt backed by your home. While this typically offers lower interest rates, it puts your home at risk if you cannot make payments. Financial advisors generally caution against this strategy unless you have a disciplined repayment plan and have addressed the spending habits that created the original debt. It is especially risky if your income is unstable."
          }
        },
        {
          "@type": "Question",
          "name": "What is the avalanche method vs. the snowball method for paying off debt?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The avalanche method prioritizes paying off debts with the highest interest rates first while making minimum payments on others, minimizing total interest paid. The snowball method prioritizes paying off the smallest balance first to build psychological momentum. Research shows the avalanche method saves more money mathematically, but the snowball method leads to better completion rates for some people due to the motivational boost of eliminating accounts."
          }
        },
        {
          "@type": "Question",
          "name": "How does debt consolidation affect my monthly payment?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Debt consolidation can lower your monthly payment in two ways: by securing a lower interest rate than your current debts carry, or by extending the repayment term over a longer period. Lowering the rate reduces total cost. Extending the term lowers the payment but increases total interest paid over the life of the loan. The best outcome combines a lower rate with a term that keeps payments manageable without dramatically extending your payoff timeline."
          }
        },
        {
          "@type": "Question",
          "name": "What should I do if I cannot afford minimum payments on my debts?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "If you cannot afford minimum payments, act immediately. First, contact your creditors directly — many have hardship programs that temporarily reduce payments or waive fees. Second, consult a nonprofit credit counselor for free at nfcc.org; they can assess whether a DMP, settlement, or bankruptcy is appropriate. Third, prioritize secured debts (mortgage, car) over unsecured debts to protect essential assets. Ignoring the problem leads to charge-offs, collections, lawsuits, and wage garnishment."
          }
        },
        {
          "@type": "Question",
          "name": "How long does negative information from debt problems stay on my credit report?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Late payments remain on your credit report for 7 years from the date of first delinquency. Collections accounts stay for 7 years. Debt settlement notations remain for 7 years. Chapter 13 bankruptcy stays for 7 years. Chapter 7 bankruptcy stays for 10 years. However, the impact of these items diminishes over time, and proactive credit rebuilding — secured cards, on-time payments, low utilization — can significantly improve your score within 2-3 years even while negative items remain."
          }
        }
      ]
    }
    </script>
