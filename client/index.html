<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Debt Consolidation App — AI-Powered Debt Relief Recommendations</title>
    <meta name="description" content="Get personalized debt relief recommendations in minutes. Our AI analyzes your financial situation and recommends the best options — from consolidation loans to debt management plans." />
    <meta name="keywords" content="debt consolidation, debt relief, debt settlement, bankruptcy, balance transfer, debt management plan, AI debt advisor, debt consolidation calculator" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="DebtConsolidationApp.com" />

    <!-- Open Graph -->
    <meta property="og:title" content="Debt Consolidation App — AI-Powered Debt Relief Recommendations" />
    <meta property="og:description" content="Get personalized debt relief recommendations in minutes. Our AI analyzes your financial situation and recommends the best debt relief options." />

    <meta property="og:url" content="https://debtconsolidationapp.com" />
    <meta property="og:site_name" content="DebtConsolidationApp.com" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Debt Consolidation App — AI-Powered Debt Relief Recommendations" />
    <meta name="twitter:description" content="Get personalized debt relief recommendations in minutes. Our AI analyzes your financial situation and recommends the best debt relief options." />

    <!-- AI Tool Directory Discovery -->
    <link rel="manifest" href="/ai-plugin.json" />
    <meta name="application-name" content="Debt Consolidation App" />
    <meta name="category" content="Finance, Debt Relief, AI Tools" />
    <meta name="classification" content="Personal Finance Tool" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Debt Consolidation App",
      "url": "https://debtconsolidationapp.com",
      "description": "AI-powered debt relief recommendation tool that analyzes your financial situation and ranks all five debt relief options by suitability.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "AI-powered debt relief recommendations",
        "Analyzes 5 debt relief options: consolidation loan, balance transfer, DMP, settlement, bankruptcy",
        "Credit score impact assessment",
        "Home purchase timeline analysis",
        "Personalized suitability scores",
        "PDF export of results",
        "Shareable results link",
        "Post-results AI chat advisor"
      ],
      "creator": {
        "@type": "Organization",
        "name": "DebtConsolidationApp.com",
        "url": "https://debtconsolidationapp.com"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is debt consolidation?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Debt consolidation combines multiple debts into a single loan or payment, typically at a lower interest rate, making it easier to manage and potentially saving money on interest."
          }
        },
        {
          "@type": "Question",
          "name": "How does debt settlement affect my credit score?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Debt settlement typically causes a credit score drop of 100-200+ points and remains on your credit report for 7 years. It makes qualifying for mortgages and other loans very difficult during and after the program."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between Chapter 7 and Chapter 13 bankruptcy?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Chapter 7 bankruptcy liquidates assets to discharge debt and stays on your credit report for 10 years. Chapter 13 creates a repayment plan over 3-5 years and stays on your report for 7 years. Both severely impact your credit score."
          }
        },
        {
          "@type": "Question",
          "name": "What is a debt management plan (DMP)?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A debt management plan is a structured repayment program offered through nonprofit credit counseling agencies. They negotiate lower interest rates with your creditors and you make one monthly payment to the agency, which distributes it to your creditors."
          }
        },
        {
          "@type": "Question",
          "name": "Can I buy a house after debt settlement or bankruptcy?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "After debt settlement, most lenders require 2-4 years of rebuilt credit before approving a mortgage. After Chapter 7 bankruptcy, FHA loans require a 2-year waiting period; conventional loans require 4 years. Chapter 13 may allow FHA loans after 1 year of on-time payments."
          }
        }
      ]
    }
    </script>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900;1,14..32,400&display=swap" rel="stylesheet" />

    <script
